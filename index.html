<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 추천곡</title>
<style>
:root {
  color-scheme: light;
  --accent: #555;
  --bg: #F9F9F9;
  --card: #FFFFFF;
  --text: #111;
  --text-muted: #999;
  --border: #EBEBEB;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 24px;
  transition: background 0.5s ease;
}
.app { width: 100%; max-width: 380px; }

.step { display: none; }
.step.active { display: block; animation: up .4s cubic-bezier(.4,0,.2,1) both; }
@keyframes up { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

/* Brand */
.brand { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:56px; }
.brand-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); }
.brand-name { font-size:10px; font-weight:700; letter-spacing:.16em; color:var(--text-muted); text-transform:uppercase; }

/* Step 1 */
.input-label { display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:10px; letter-spacing:.04em; }
input[type="text"] {
  width:100%; padding:15px 18px; font-size:16px; font-family:inherit; color:var(--text);
  background:var(--card); border:1.5px solid var(--border); border-radius:14px;
  outline:none; transition:border-color .2s, box-shadow .2s; margin-bottom:12px;
}
input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent); }
input[type="text"]::placeholder { color:#CCC; }
input.shake { animation:shake .3s; border-color:#E84848!important; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.btn-go {
  width:100%; padding:15px; font-size:15px; font-weight:700; font-family:inherit;
  color:#fff; background:var(--accent); border:none; border-radius:14px; cursor:pointer;
  transition:transform .12s, box-shadow .2s;
}
.btn-go:hover { transform:translateY(-2px); box-shadow:0 6px 20px color-mix(in srgb, var(--accent) 35%, transparent); }
.btn-go:active { transform:none; }

/* Step 2 */
.color-headline { text-align:center; margin-bottom:40px; }
.color-pre { font-size:15px; font-weight:400; color:var(--text-muted); margin-bottom:6px; }
.color-word { font-size:40px; font-weight:800; line-height:1; min-height:48px; transition:color .2s, opacity .2s; color:var(--text); opacity:.15; display:inline; }
.color-word.active { opacity:1; }
.color-suffix { font-size:26px; font-weight:700; color:var(--text-muted); transition:opacity .2s; opacity:0; display:inline; }
.color-suffix.active { opacity:1; }
.swatch-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
.swatch-item { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:transform .18s; -webkit-tap-highlight-color:transparent; }
.swatch-item:hover { transform:translateY(-3px); }
.swatch-item:active { transform:none; }
.swatch-circle { width:60px; height:60px; border-radius:50%; box-shadow:0 3px 12px rgba(0,0,0,.14); transition:box-shadow .2s; position:relative; }
.swatch-item.selected .swatch-circle { outline:3px solid var(--text); outline-offset:4px; }
.swatch-item.selected .swatch-circle::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:22px; color:rgba(255,255,255,.9); }
.swatch-label { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:.05em; }

/* Loading overlay on step 2 */
.loading-overlay {
  text-align:center; padding:40px 0;
}
.spin { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin-label { font-size:13px; color:var(--text-muted); }

/* Step 3 */
.rec-top { text-align:center; margin-bottom:28px; }
.rec-badge { display:inline-block; padding:4px 12px; border-radius:99px; font-size:11px; font-weight:700; letter-spacing:.06em; margin-bottom:10px; }
.rec-for { font-size:16px; font-weight:800; color:var(--text); line-height:1.4; }
.cover-wrap { display:flex; justify-content:center; margin-bottom:26px; }
.cover-box { width:210px; height:210px; border-radius:20px; box-shadow:0 14px 44px rgba(0,0,0,.18); overflow:hidden; position:relative; flex-shrink:0; }
.cover-box img { width:100%; height:100%; object-fit:cover; display:block; }
.cover-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.cover-initial { font-size:74px; font-weight:900; color:rgba(255,255,255,.82); letter-spacing:-3px; text-shadow:0 4px 12px rgba(0,0,0,.12); }
.song-meta { text-align:center; margin-bottom:18px; }
.song-artist { font-size:12px; font-weight:500; color:var(--text-muted); letter-spacing:.04em; margin-bottom:6px; }
.song-title { font-size:23px; font-weight:800; color:var(--text); line-height:1.2; }
.comment-wrap { display:flex; gap:11px; background:var(--card); border-radius:13px; padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.05); margin-bottom:24px; }
.comment-line { width:3px; border-radius:99px; background:var(--accent); flex-shrink:0; }
.comment-text { font-size:13px; line-height:1.75; color:var(--text-muted); font-style:italic; }
.btn-shuffle { width:100%; padding:14px; font-size:14px; font-weight:700; font-family:inherit; color:var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent); border:1.5px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius:13px; cursor:pointer; margin-bottom:10px; transition:background .2s, transform .12s; }
.btn-shuffle:hover { background:color-mix(in srgb, var(--accent) 14%, transparent); transform:translateY(-1px); }
.btn-back { width:100%; padding:11px; font-size:13px; font-family:inherit; color:var(--text-muted); background:transparent; border:none; cursor:pointer; transition:color .2s; }
.btn-back:hover { color:var(--text); }

/* Admin-only settings */
.gear-btn {
  position:fixed; top:18px; right:18px; width:36px; height:36px;
  background:var(--card); border:1px solid var(--border); border-radius:50%;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:transform .3s; z-index:100;
}
.gear-btn.visible { display:flex; }
.gear-btn:hover { transform:rotate(45deg); }
.settings-drawer {
  position:fixed; top:62px; right:18px; width:290px;
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:18px; box-shadow:0 8px 28px rgba(0,0,0,.1);
  display:none; z-index:100; animation:up .18s both;
}
.settings-drawer.open { display:block; }
.s-title { font-size:12px; font-weight:700; color:var(--text); margin-bottom:8px; }
.s-body { font-size:11px; color:var(--text-muted); line-height:1.65; }
.s-body b { color:var(--text); }
.s-status { font-size:11px; color:var(--text-muted); margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
</style>
</head>
<body>

<!-- Admin-only gear (visible only with ?admin=1) -->
<button class="gear-btn" id="gearBtn" onclick="toggleSettings()">⚙️</button>
<div class="settings-drawer" id="settingsDrawer">
  <div class="s-title">🎵 곡 목록 관리</div>
  <div class="s-body">
    시트의 <b>컬러</b> 컬럼에 색상명을 입력하세요.<br>
    <span style="opacity:.7">예: 레드 / 블루 / 그린 / 퍼플 / 핑크 / 옐로우 / 블랙 / 오렌지</span><br><br>
    시트를 <b>"링크가 있는 모든 사용자 → 뷰어"</b>로 공개하면 저장 즉시 반영돼요.<br><br>
    이 버튼은 URL에 <b>?admin=1</b>이 있을 때만 표시돼요.
  </div>
  <div class="s-status" id="syncStatus">마지막 동기화: —</div>
</div>

<div class="app">

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Sound Republica</span>
      <div class="brand-dot"></div>
    </div>
    <label class="input-label" for="nicknameInput">닉네임을 입력해주세요</label>
    <input type="text" id="nicknameInput" placeholder="이름 또는 닉네임" maxlength="20"
           onkeydown="if(event.key==='Enter') goStep2()">
    <button class="btn-go" onclick="goStep2()">시작하기 →</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div id="step2Content">
      <!-- loading or color picker, filled by JS -->
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="rec-top">
      <div class="rec-badge" id="recBadge"></div>
      <div class="rec-for" id="recFor"></div>
    </div>
    <div class="cover-wrap">
      <div class="cover-box" id="coverBox">
        <div class="cover-fallback" id="coverFallback">
          <span class="cover-initial" id="coverInitial"></span>
        </div>
      </div>
    </div>
    <div class="song-meta">
      <div class="song-artist" id="songArtist"></div>
      <div class="song-title"  id="songTitle"></div>
    </div>
    <div class="comment-wrap">
      <div class="comment-line" id="commentLine"></div>
      <div class="comment-text" id="commentText"></div>
    </div>
    <button class="btn-shuffle" onclick="nextSong()">🔀 다른 곡 추천받기</button>
    <button class="btn-back"    onclick="goStep2()">← 컬러 다시 고르기</button>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────
const SHEET_ID  = '1Rk-pqapYhpD7KQMsU3P4f4XOYeKqMNxhB_0H19UZzbg';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

// ── Color palette ─────────────────────────────────────────────
const COLORS = {
  '레드':   { hex:'#D63030', bg:'#FFF4F4' },
  '핑크':   { hex:'#D840A0', bg:'#FFF3FB' },
  '오렌지': { hex:'#E07020', bg:'#FFF8F0' },
  '옐로우': { hex:'#C8A020', bg:'#FFFBF0' },
  '그린':   { hex:'#38A060', bg:'#F3FBF5' },
  '민트':   { hex:'#30A898', bg:'#F3FBFA' },
  '블루':   { hex:'#3060C8', bg:'#F3F7FF' },
  '퍼플':   { hex:'#7840C0', bg:'#F8F3FF' },
  '브라운': { hex:'#905040', bg:'#FBF6F4' },
  '블랙':   { hex:'#1A1A1A', bg:'#F5F5F5' },
  '화이트': { hex:'#9A9A9A', bg:'#F8F8F8' },
  // 구 무드값 → 컬러 매핑 (하위 호환)
  '비':     { hex:'#3060C8', bg:'#F3F7FF' },
  '행운':   { hex:'#38A060', bg:'#F3FBF5' },
  '위로':   { hex:'#7840C0', bg:'#F8F3FF' },
  '화창':   { hex:'#C8A020', bg:'#FFFBF0' },
};

// ── Song data (마지막 시트 동기화: 2026-06-10) ────────────────
const FALLBACK = [
  { artist:'윤준', title:'밑 빠진 나', coverUrl:'https://image.bugsm.co.kr/album/images/original/208060/20806057.jpg', color:'블루', comment:'빗소리처럼 자연스럽게 스며드는 곡이에요. 잠시 멍하니 들어보세요.', grad:['#6090D8','#2850A8'] },
  { artist:'블낫블(blue is not blue)', title:'paradise', coverUrl:'https://image.bugsm.co.kr/album/images/original/207433/20743316.jpg', color:'블루', comment:'오늘은 왠지 좋은 일이 생길 것 같지 않나요? 이 곡이 그 시작이에요.', grad:['#6090D8','#2850A8'] },
];

// ── State ─────────────────────────────────────────────────────
let songs        = [];
let songsReady   = false;
let nickname     = '';
let currentColor = '';
let songOffset   = 0;
let settingsOpen = false;
const IS_ADMIN   = new URLSearchParams(location.search).has('admin');

// ── Init ──────────────────────────────────────────────────────
if (IS_ADMIN) document.getElementById('gearBtn').classList.add('visible');

const saved = localStorage.getItem('sr_nick');
if (saved) document.getElementById('nicknameInput').value = saved;

// Start fetching sheet in background immediately
fetchSheet();

// ── CSV fetch & parse ─────────────────────────────────────────
async function fetchSheet() {
  try {
    const res = await fetch(CSV_URL + `&_c=${new Date().toDateString()}`);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const parsed = parseCSV(text);
    if (parsed.length > 0) {
      songs = parsed;
      if (IS_ADMIN) {
        document.getElementById('syncStatus').textContent =
          `마지막 동기화: ${new Date().toLocaleTimeString('ko-KR')} · ${songs.length}곡`;
      }
    } else {
      songs = FALLBACK;
    }
  } catch {
    songs = FALLBACK;
  }
  songsReady = true;
  // If user already got to step 2 while loading, render now
  if (document.getElementById('step2').classList.contains('active')) {
    renderColorPicker();
  }
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) { // skip header
    const line = lines[i].trim();
    if (!line) continue;
    const cols = splitCSVLine(line);
    if (cols.length < 4) continue;
    const [artist, title, coverUrl, colorRaw, ...rest] = cols;
    const comment = rest.join(',').trim();
    if (!artist || !title) continue;
    const colorKey = Object.keys(COLORS).find(k => colorRaw.trim().includes(k)) || null;
    if (!colorKey) continue;
    const cfg = COLORS[colorKey];
    rows.push({
      artist: artist.trim(),
      title:  title.trim(),
      coverUrl: coverUrl.trim(),
      color:   colorKey,
      comment: comment || '이 곡을 들으며 잠시 쉬어가요.',
      grad:    [cfg.hex, darken(cfg.hex)],
    });
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result.map(s => s.trim());
}

function darken(hex) {
  return `rgb(${[1,3,5].map(i => Math.max(0, parseInt(hex.slice(i,i+2),16)-55)).join(',')})`;
}

// ── Step 1 ────────────────────────────────────────────────────
function goStep2() {
  const val = document.getElementById('nicknameInput').value.trim();
  if (!val) {
    const inp = document.getElementById('nicknameInput');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 350);
    inp.focus();
    return;
  }
  nickname = val;
  localStorage.setItem('sr_nick', val);
  currentColor = '';
  songOffset   = 0;
  showStep('step2');

  if (!songsReady) {
    // Show spinner while waiting
    document.getElementById('step2Content').innerHTML = `
      <div class="loading-overlay">
        <div class="spin"></div>
        <div class="spin-label">곡 불러오는 중...</div>
      </div>`;
  } else {
    renderColorPicker();
  }
}

// ── Step 2 – color picker ─────────────────────────────────────
function renderColorPicker() {
  const available = [...new Set(songs.map(s => s.color))];
  const html = `
    <div class="color-headline">
      <div class="color-pre">오늘은 왠지</div>
      <div>
        <span class="color-word" id="colorWord">—</span><span class="color-suffix" id="colorSuffix"></span>
      </div>
    </div>
    <div class="swatch-grid" id="swatchGrid">
      ${available.map(c => {
        const cfg = COLORS[c] || { hex:'#888' };
        return `
          <div class="swatch-item" data-color="${c}"
               onclick="pickColor('${c}', this)"
               onmouseenter="hoverColor('${c}')"
               onmouseleave="unhoverColor()">
            <div class="swatch-circle" style="background:${cfg.hex}"></div>
            <div class="swatch-label">${c.toUpperCase()}</div>
          </div>`;
      }).join('')}
    </div>`;
  document.getElementById('step2Content').innerHTML = html;
}

function hoverColor(c) {
  const cfg = COLORS[c] || { hex:'#888' };
  const w = document.getElementById('colorWord');
  const s = document.getElementById('colorSuffix');
  if (!w) return;
  w.textContent = c; w.style.color = cfg.hex; w.classList.add('active');
  s.textContent = particle(c); s.classList.add('active');
}
function unhoverColor() {
  if (currentColor) { hoverColor(currentColor); return; }
  const w = document.getElementById('colorWord');
  const s = document.getElementById('colorSuffix');
  if (!w) return;
  w.textContent = '—'; w.style.color = ''; w.classList.remove('active');
  s.textContent = ''; s.classList.remove('active');
}
function pickColor(c, card) {
  document.querySelectorAll('.swatch-item').forEach(el => el.classList.remove('selected'));
  card.classList.add('selected');
  currentColor = c;
  songOffset   = 0;
  const cfg = COLORS[c] || { hex:'#888', bg:'#F8F8F8' };
  setTheme(cfg.hex, cfg.bg);
  setTimeout(() => renderSong(), 200);
}

// ── Step 3 – song ─────────────────────────────────────────────
function renderSong() {
  const pool = songs.filter(s => s.color === currentColor);
  if (!pool.length) return;
  const idx  = hash(nickname + today() + currentColor + songOffset) % pool.length;
  const song = pool[idx];
  const cfg  = COLORS[currentColor] || { hex:'#888' };

  document.getElementById('recBadge').textContent = currentColor.toUpperCase();
  document.getElementById('recBadge').style.cssText =
    `background:${cfg.hex}18;color:${cfg.hex};padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:10px;display:inline-block`;
  document.getElementById('recFor').textContent = `${nickname}${nameParticle(nickname)} 위한 오늘의 추천곡`;

  const box      = document.getElementById('coverBox');
  const fallback = document.getElementById('coverFallback');
  const initial  = document.getElementById('coverInitial');
  const oldImg   = box.querySelector('img');
  if (oldImg) oldImg.remove();
  fallback.style.display    = 'flex';
  fallback.style.background = `linear-gradient(135deg,${song.grad[0]},${song.grad[1]})`;
  initial.textContent       = song.artist.slice(0,1).toUpperCase();

  if (song.coverUrl) {
    const img = Object.assign(document.createElement('img'), {
      src: song.coverUrl, alt: song.title,
      style: 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover',
    });
    img.onload  = () => { fallback.style.display = 'none'; };
    img.onerror = () => img.remove();
    box.appendChild(img);
  }

  document.getElementById('songArtist').textContent = song.artist;
  document.getElementById('songTitle').textContent  = song.title;
  document.getElementById('commentLine').style.background = cfg.hex;
  document.getElementById('commentText').textContent = song.comment || '이 곡을 들으며 잠시 쉬어가요.';
  showStep('step3');
}

function nextSong() { songOffset++; renderSong(); }

// ── Helpers ───────────────────────────────────────────────────
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return Math.abs(h);
}
function today() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function particle(n) {
  const c = n[n.length-1].charCodeAt(0);
  if (c < 0xAC00 || c > 0xD7A3) return '야';
  return (c-0xAC00)%28===0 ? '야' : '이야';
}
function nameParticle(n) {
  const c = n[n.length-1].charCodeAt(0);
  if (c < 0xAC00 || c > 0xD7A3) return '을/를';
  return (c-0xAC00)%28===0 ? '를' : '을';
}
function setTheme(hex, bg) {
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--bg', bg);
}
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Settings ──────────────────────────────────────────────────
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsDrawer').classList.toggle('open', settingsOpen);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.gear-btn') && !e.target.closest('.settings-drawer')) {
    settingsOpen = false;
    document.getElementById('settingsDrawer').classList.remove('open');
  }
});
</script>
</body>
</html>
